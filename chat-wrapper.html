<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'Abel', sans-serif;
  font-size: 20px;
  color: #fffefe;
}

#chatContainer {
  flex: 1;
  width: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

#log {
  width: 100%;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.chatMsg {
  margin-bottom: 4px;
  animation: fadeIn 0.2s ease;
  word-break: break-word;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.innerChat {
  display: inline-block;
  padding: 2px 8px;
  position: relative;
  word-break: break-word;
  width: 100%;
}

.chatBg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  z-index: 0;
}

.meta, .message {
  position: relative;
  z-index: 1;
  word-wrap: break-word;
}

.badge {
  display: inline-block;
  height: 0.85em;
  vertical-align: middle;
  margin-right: 0.2em;
  position: relative;
  top: -0.1em;
}

/* ALERTAS SUBS KICK */
.alert-msg {
  margin-bottom: 6px;
  animation: alertPop 0.3s ease;
}

@keyframes alertPop {
  from { opacity: 0; transform: scale(0.95) translateY(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.alert-inner {
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}

.alert-icon { font-size: 16px; flex-shrink: 0; }
.alert-name { font-weight: 700; font-size: 1em; }
.alert-text { font-size: 0.82em; opacity: 0.9; }

.alert-sub {
  background: rgba(83,252,24,0.18);
  border-left: 3px solid #53fc18;
}

/* GIFT STACKS — aparecen arriba del log */
#gift-stacks {
  width: 100%;
  padding: 0 10px 4px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.gift-stack {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  border-left: 3px solid #ff3c50;
  background: rgba(255,60,80,0.25);
  font-size: 0.85em;
  animation: fadeIn 0.2s ease;
}

.gift-stack.rose {
  border-left-color: #ff6496;
  background: rgba(255,100,150,0.25);
}

.gift-stack-icon { font-size: 15px; flex-shrink: 0; }
.gift-stack-name { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gift-stack-count {
  font-weight: 700;
  font-size: 1em;
  background: rgba(255,255,255,0.15);
  padding: 1px 7px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* LIKES */
#like-counter {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  border-left: 3px solid #ff5050;
  background: rgba(255,80,80,0.18);
  margin: 0 10px 4px;
  font-size: 0.9em;
}
#like-counter.visible { display: flex; }
#like-count { font-weight: 700; font-size: 1.1em; }
</style>
</head>
<body>

<div id="gift-stacks"></div>
<div id="like-counter">
  <span style="font-size:16px">❤️</span>
  <span id="like-count">0</span>
  <span style="opacity:0.8">likes</span>
</div>

<div id="chatContainer">
  <div id="log"></div>
</div>

<script>
const TIKTOK_USERNAME = '@ingenando2';
const KICK_CHANNEL    = 'mariotq';
const MAX_MSGS        = 30;
const IGNORED_USERS   = ['botrix','streamelements','kickbot','kicklet'];
const GIFT_TIMEOUT    = 8000; // ms sin regalo nuevo para que desaparezca

const PLATFORM_BADGE = {
  kick:   'https://cdn.mrboostlive.com/kicklogo.png',
  tiktok: 'https://cdn.streamelements.com/uploads/4a562bfd-b997-459f-8f9e-d9fe5370f522.png'
};

const GIFT_ICONS = {
  'Rose': '🌹',
  'GG': '🎮',
  'Finger Heart': '🤙',
  'TikTok Universe': '🌌',
  'default': '🎁'
};

function getPlatformBadge(p) {
  return '<img src="' + PLATFORM_BADGE[p] + '" class="badge">';
}

const log        = document.getElementById('log');
const giftStacks = document.getElementById('gift-stacks');
const likeCounter = document.getElementById('like-counter');
const likeCountEl = document.getElementById('like-count');

// Estado de gifts stackeados: { giftName: { el, count, timer } }
const activeGifts = {};

let likeCount = 0;
let likeTimer = null;

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function trim() {
  const msgs = log.querySelectorAll('.chatMsg, .alert-msg');
  if (msgs.length > MAX_MSGS) {
    for (let i = 0; i < msgs.length - MAX_MSGS; i++) msgs[i].remove();
  }
}

function defaultColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return 'hsl(' + (Math.abs(h) % 360) + ',65%,72%)';
}

// Mensaje normal
function addMessage(platform, username, message, color) {
  if (IGNORED_USERS.includes(username.toLowerCase())) return;
  const el = document.createElement('div');
  el.className = 'chatMsg';
  el.setAttribute('data-sender', username);
  const nameColor = color || defaultColor(username);
  el.innerHTML =
    '<div class="innerChat">' +
      '<div class="chatBg"></div>' +
      '<span class="meta">' +
        '<span style="color:' + nameColor + '">' +
          getPlatformBadge(platform) +
          '<strong>' + escHtml(username) + '</strong>' +
          '<span style="opacity:0.5"> : </span>' +
        '</span>' +
      '</span>' +
      '<span class="message">' + message + '</span>' +
    '</div>';
  log.appendChild(el);
  trim();
}

// Alerta fija (subs Kick)
function addAlert(type, username, label) {
  const el = document.createElement('div');
  el.className = 'alert-msg';
  el.innerHTML =
    '<div class="alert-inner alert-' + type + '">' +
      '<span class="alert-icon">⭐</span>' +
      '<div>' +
        '<div class="alert-name">' + escHtml(username) + '</div>' +
        '<div class="alert-text">' + label + '</div>' +
      '</div>' +
    '</div>';
  log.appendChild(el);
  trim();
}

// Regalos stackeados
function addGift(giftName, username, count) {
  const key = giftName;
  const icon = GIFT_ICONS[giftName] || GIFT_ICONS['default'];
  const isRose = giftName === 'Rose';

  if (activeGifts[key]) {
    // Ya existe — sumar y actualizar
    activeGifts[key].count += count;
    activeGifts[key].el.querySelector('.gift-stack-count').textContent = 'x' + activeGifts[key].count;
    activeGifts[key].el.querySelector('.gift-stack-name').textContent = username + ' — ' + giftName;
    clearTimeout(activeGifts[key].timer);
  } else {
    // Crear nuevo stack
    const el = document.createElement('div');
    el.className = 'gift-stack' + (isRose ? ' rose' : '');
    el.innerHTML =
      '<span class="gift-stack-icon">' + icon + '</span>' +
      '<span class="gift-stack-name">' + escHtml(username) + ' — ' + escHtml(giftName) + '</span>' +
      '<span class="gift-stack-count">x' + count + '</span>';
    giftStacks.appendChild(el);
    activeGifts[key] = { el, count, timer: null };
  }

  // Reset timer para desaparecer
  activeGifts[key].timer = setTimeout(() => {
    activeGifts[key].el.remove();
    delete activeGifts[key];
  }, GIFT_TIMEOUT);
}

// Likes stackeados
function addLike() {
  likeCount++;
  likeCountEl.textContent = likeCount;
  likeCounter.classList.add('visible');
  clearTimeout(likeTimer);
  likeTimer = setTimeout(() => {
    likeCounter.classList.remove('visible');
    likeCount = 0;
    likeCountEl.textContent = '0';
  }, GIFT_TIMEOUT);
}

// ─── TIKTOK ───────────────────────────────────────────────
const TIKFINITY  = 'ws://localhost:21213/';
const TIKTOK_VPS = 'wss://vps.mrboostlive.com/tiktok';
let tiktokSource = null;

function handleTikTokMsg(ev) {
  try {
    const msg = JSON.parse(ev.data);
    const data = msg.data || {};
    if (msg.event === 'chat') {
      const color = '#' + md5(data.nickname || '').substr(26);
      addMessage('tiktok', data.nickname || '', escHtml(data.comment || ''), color);
    } else if (msg.event === 'gift') {
      const giftName = data.giftName || data.gift_name || 'Regalo';
      const count = data.repeatCount || data.repeat_count || 1;
      addGift(giftName, data.nickname || '', count);
    } else if (msg.event === 'like') {
      addLike();
    }
  } catch(e) {}
}

function startTikTok() {
  const tikfinity = new WebSocket(TIKFINITY);
  tikfinity.addEventListener('open', () => { tiktokSource = 'tikfinity'; });
  tikfinity.addEventListener('message', ev => { if (tiktokSource === 'tikfinity') handleTikTokMsg(ev); });
  tikfinity.addEventListener('close', () => {
    if (tiktokSource === 'tikfinity') tiktokSource = null;
    setTimeout(startTikTok, 5000);
  });
  tikfinity.addEventListener('error', () => {});

  setTimeout(() => {
    if (tiktokSource === 'tikfinity') return;
    const vps = new WebSocket(TIKTOK_VPS);
    vps.addEventListener('open', () => {
      if (tiktokSource === 'tikfinity') { vps.close(); return; }
      tiktokSource = 'vps';
      vps.send(JSON.stringify({ tiktokUsername: TIKTOK_USERNAME }));
    });
    vps.addEventListener('message', ev => { if (tiktokSource === 'vps') handleTikTokMsg(ev); });
    vps.addEventListener('close', () => {
      if (tiktokSource === 'vps') tiktokSource = null;
      setTimeout(() => { if (tiktokSource !== 'tikfinity') startTikTok(); }, 5000);
    });
    vps.addEventListener('error', () => {});
  }, 2500);
}

// ─── KICK ─────────────────────────────────────────────────
async function connectKick() {
  try {
    const r = await fetch('https://mrboostlive.com/kick/api/?channel=' + KICK_CHANNEL);
    const d = await r.json();
    const ws = new WebSocket('wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.6.0&flash=false');
    ws.onopen = () => {
      ws.send(JSON.stringify({ event: 'pusher:subscribe', data: { auth: '', channel: 'chatrooms.' + d.chatroom.id + '.v2' } }));
    };
    ws.onmessage = ({ data }) => {
      try {
        const j = JSON.parse(data);
        const sub = JSON.parse(j.data || '{}');
        if (j.event === 'App\\Events\\ChatroomClearEvent') { log.innerHTML = ''; return; }
        if (j.event === 'App\\Events\\UserBannedEvent') {
          document.querySelectorAll('.chatMsg[data-sender="' + sub.user?.username + '"]').forEach(e => e.remove());
          return;
        }
        if (j.event === 'App\\Events\\SubscriptionEvent' && sub.username) {
          addAlert('sub', sub.username, 'Sub x' + sub.months + ' — Kick');
          return;
        }
        if (j.event === 'App\\Events\\GiftedSubscriptionsEvent') {
          addAlert('sub', sub.gifter_username || '', 'Gifted x' + (sub.gifted_usernames?.length || 1) + ' — Kick');
          return;
        }
        if (sub.type !== 'message' && sub.type !== 'reply') return;
        if (IGNORED_USERS.includes((sub.sender?.username || '').toLowerCase())) return;
        if ((sub.content || '').startsWith('!')) return;
        let username = sub.sender?.username || '';
        if (sub.type === 'reply') username += ' → ' + (sub.metadata?.original_sender?.username || '');
        addMessage('kick', username, escHtml(sub.content || ''), sub.sender?.identity?.color || null);
      } catch(e) {}
    };
    ws.onclose = () => setTimeout(connectKick, 3000);
    ws.onerror = () => ws.close();
  } catch(e) { setTimeout(connectKick, 5000); }
}

startTikTok();
connectKick();
</script>
</body>
</html>
