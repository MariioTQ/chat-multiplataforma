<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#chatContainer {
  flex: 1;
  width: 100%;
  overflow: hidden;
  position: relative;
}

#chatFrame {
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% / 1.5);
  height: calc(100% / 1.5);
  border: none;
  transform: scale(1.5);
  transform-origin: top left;
}
</style>
</head>
<body>

<div id="chatContainer">
  <iframe
    id="chatFrame"
    src="https://streamelements.com/overlay/69bb69af1a21c5df53f97212/QHFWynduBGyYldFQHXlZ7P5kT4_hN8hrB0v8Pou7B5aM7Ua3"
    scrolling="no">
  </iframe>
</div>

</body>
</html>
